<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Favs Panel</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="theme-init.js"></script>
</head>
<body>
  <div class="app">

    <aside class="sidebar">
      <div class="brand">
        <img class="brand-mark" src="icons/icon48.png" width="30" height="30" alt="" aria-hidden="true" />
        <div>
          <div class="brand-title">
            <h1>Favs Panel</h1>
            <span id="app-version" class="version-badge"></span>
          </div>
          <p id="global-stats" class="brand-sub">cargando…</p>
        </div>
      </div>

      <nav id="folder-tree" class="tree" data-i18n-aria="folderNavLabel" aria-label="Bookmark folders"></nav>

      <div class="sidebar-footer">
        <div class="footer-actions">
          <button id="theme-toggle" class="icon-toggle theme-toggle" title="Switch to dark mode" aria-label="Switch to dark mode" aria-pressed="false">
            <svg class="icon-moon" viewBox="0 0 20 20" fill="currentColor"><path d="M17 12.4A7.5 7.5 0 0 1 7.6 3a7.5 7.5 0 1 0 9.4 9.4z"/></svg>
            <svg class="icon-sun" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="10" cy="10" r="3.5"/><path d="M10 2.5v2M10 15.5v2M17.5 10h-2M4.5 10h-2M15.1 4.9l-1.4 1.4M6.3 13.7l-1.4 1.4M15.1 15.1l-1.4-1.4M6.3 6.3 4.9 4.9"/></svg>
          </button>

          <button id="lang-toggle" class="icon-toggle lang-toggle" title="Switch to Spanish" aria-label="Switch to Spanish">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="7.5"/><path d="M2.5 10h15M10 2.5a11 11 0 0 1 0 15M10 2.5a11 11 0 0 0 0 15"/></svg>
            <span class="lang-code">EN</span>
          </button>
        </div>

        <p class="credit">
          <span data-i18n="creditPrefix">Made by</span>
          <a href="https://services.francososa.dev" target="_blank" rel="noopener">Franco Sosa</a>
          ·
          <a href="https://github.com/francososa97/favs-panel" target="_blank" rel="noopener" data-i18n="creditGithub">Code on GitHub</a>
        </p>

        <a class="coffee-link" href="https://cafecito.app/francososa13" target="_blank" rel="noopener">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 8h9v4a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V8z"/>
            <path d="M13 9h1.5a2 2 0 0 1 0 4H13"/>
            <path d="M7 4.2c-.5.6-.5 1.2 0 1.8M9.5 4.2c-.5.6-.5 1.2 0 1.8"/>
          </svg>
          <span data-i18n="supportProject">Buy me a coffee</span>
        </a>
      </div>
    </aside>

    <main class="main">
      <header class="toolbar">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
            <circle cx="9" cy="9" r="5.5"/><path d="M17 17l-3.5-3.5"/>
          </svg>
          <input
            id="search"
            type="search"
            data-i18n-placeholder="searchPlaceholder"
            placeholder="Search by title or URL…  ( / )"
            autocomplete="off"
            spellcheck="false"
          />
        </div>

        <div class="toolbar-right">
          <select id="sort" data-i18n-aria="sortLabel" aria-label="Sort">
            <option value="recent" data-i18n="sortRecent">Most recent</option>
            <option value="oldest" data-i18n="sortOldest">Oldest</option>
            <option value="az" data-i18n="sortAz">A → Z</option>
            <option value="za" data-i18n="sortZa">Z → A</option>
            <option value="domain" data-i18n="sortDomain">By domain</option>
          </select>

          <div class="view-switch" role="group" data-i18n-aria="viewTypeLabel" aria-label="View type">
            <button id="view-list" class="view-btn active" data-i18n-title="viewList" title="List view" aria-label="List view" aria-pressed="true">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 6h12M4 10h12M4 14h12"/></svg>
            </button>
            <button id="view-grid" class="view-btn" data-i18n-title="viewGrid" title="Grid view" aria-label="Grid view" aria-pressed="false">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="6" height="6" rx="1.5"/><rect x="11" y="3" width="6" height="6" rx="1.5"/><rect x="3" y="11" width="6" height="6" rx="1.5"/><rect x="11" y="11" width="6" height="6" rx="1.5"/></svg>
            </button>
          </div>

          <button id="toggle-view" class="btn-ghost" data-i18n-title="compactView" title="Compact view" aria-label="Compact view" aria-pressed="false">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 6h12M4 10h12M4 14h8"/></svg>
          </button>

          <button id="new-bookmark" class="btn-fab" data-i18n-title="newBookmark" title="New bookmark" aria-label="New bookmark">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 4v12M4 10h12"/></svg>
          </button>
        </div>
      </header>

      <div class="context-bar">
        <span id="context-path" class="context-path" data-i18n="allBookmarks">All bookmarks</span>
        <span id="context-count" class="context-count"></span>
      </div>

      <section id="list" class="list" aria-live="polite"></section>

      <div id="empty" class="empty" hidden>
        <p data-i18n="emptyTitle">Nothing here.</p>
        <p class="empty-sub" data-i18n="emptySub">Try another search or folder.</p>
        <button id="empty-create" class="btn-primary" data-i18n="emptyCreate">Create a bookmark</button>
      </div>
    </main>
  </div>

  <div id="toast" class="toast" hidden></div>

  <div id="modal-backdrop" class="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <h2 id="modal-title" data-i18n="modalTitle">New bookmark</h2>
      <form id="bookmark-form">
        <div class="field">
          <label for="bm-title" data-i18n="fieldTitle">Title</label>
          <input id="bm-title" type="text" data-i18n-placeholder="titlePlaceholder" placeholder="Uses the domain if left empty" autocomplete="off" />
        </div>
        <div class="field">
          <label for="bm-url" data-i18n="fieldUrl">URL</label>
          <input id="bm-url" type="text" placeholder="https://example.com" autocomplete="off" required />
        </div>
        <div class="field">
          <label for="bm-folder" data-i18n="fieldFolder">Folder</label>
          <select id="bm-folder"></select>
        </div>
        <div class="modal-actions">
          <button type="button" id="modal-cancel" class="btn-secondary" data-i18n="cancel">Cancel</button>
          <button type="submit" class="btn-primary" data-i18n="create">Create bookmark</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
